name: snapcal
description: "SnapCal: AI Calorie Counter - Snap a photo, track your calories."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0-209.1.beta

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^14.6.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera & Gallery
  camera: ^0.11.0+2
  image_picker: ^1.0.7
  mobile_scanner: ^5.1.0

  # HTTP & API
  dio: ^5.4.0

  # Firebase & Auth
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1

  # UI Components
  lucide_icons: ^0.257.0
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.70.0

  # Utilities
  uuid: ^4.2.2
  intl: ^0.20.2
  path_provider: ^2.1.2
  image: ^4.1.7
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
