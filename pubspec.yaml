name: snapcal
description: "SnapCal: AI Calorie Counter - Snap a photo, track your calories."
publish_to: 'none'
version: 1.0.13+20

environment:
  sdk: ^3.7.0-209.1.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^17.2.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera & Gallery
  camera: ^0.12.0+1
  image_picker: ^1.0.7
  mobile_scanner: ^7.2.0

  # HTTP & API
  dio: ^5.4.0

  # Firebase & Auth
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.1

  # UI Components
  google_fonts: ^8.0.2
  dynamic_color: ^1.7.0
  lucide_icons: ^0.257.0
  font_awesome_flutter: ^11.0.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  fl_chart: ^1.2.0

  # Utilities
  uuid: ^4.2.2
  path_provider: ^2.1.2
  image: ^4.1.7
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  firebase_remote_config: ^6.4.0
  share_plus: ^12.0.2
  purchases_flutter: ^10.0.1
  shared_preferences: ^2.5.5
  google_mobile_ads: ^8.0.0
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.3.2
  speech_to_text: ^7.3.0
  flutter_secure_storage: ^10.0.0
  permission_handler: ^12.0.1
  cloud_firestore: ^6.3.0
  firebase_crashlytics: ^5.2.0
  connectivity_plus: ^7.1.1
  shimmer: ^3.0.0
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A202C"
  adaptive_icon_foreground: "assets/icon/icon.png"
  android_notification_icon:
    image_path: "assets/icon/icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
