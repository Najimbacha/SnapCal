name: snapcal
description: "SnapCal: AI Calorie Counter - Snap a photo, track your calories."
publish_to: 'none'
version: 1.0.21+36

environment:
  sdk: ^3.7.0-209.1.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^17.2.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera & Gallery
  camera: ^0.12.0+1
  image_picker: ^1.0.7
  mobile_scanner: ^7.2.0

  # HTTP & API
  dio: ^5.4.0

  # Firebase & Auth
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_messaging: ^16.2.2
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.1

  # UI Components
  animations: ^2.2.0
  dynamic_color: ^1.7.0
  lucide_icons: ^0.257.0
  font_awesome_flutter: ^11.0.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  fl_chart: ^1.2.0

  # Utilities
  uuid: ^4.2.2
  in_app_review: ^2.0.9
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  image: ^4.1.7
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  firebase_remote_config: ^6.4.0
  firebase_app_check: ^0.4.4
  share_plus: ^12.0.2
  purchases_flutter: ^10.0.1
  shared_preferences: ^2.5.5
  flutter_markdown: ^0.7.7+1
  url_launcher: ^6.3.2

  flutter_secure_storage: ^10.0.0
  permission_handler: ^12.0.1
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.0.0
  firebase_crashlytics: ^5.2.0
  connectivity_plus: ^7.1.1
  shimmer: ^3.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  home_widget: ^0.9.1
  ffmpeg_kit_flutter_new: ^4.1.0
  confetti: ^0.8.0
  screenshot: ^3.0.0
  health: ^13.3.1
  firebase_performance: ^0.11.4+1
  material_symbols_icons: ^4.2928.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  # Temporary Android workaround: path_provider_android 2.3.x uses JNI and
  # has caused native libdartjni startup crashes on some devices.
  path_provider_android: 2.2.23

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A202C"
  adaptive_icon_foreground: "assets/icon/icon.png"
  android_notification_icon:
    image_path: "assets/icon/icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
    - assets/images/paywall/
    - assets/avatar/
